# Canonical tag registry for the blog.
# Publisher validates every draft's `tags:` against this list before deploy.
# To introduce a new tag, add it here first, then use it in a draft.
# Grouping is for human readability only; validator flattens all groups.

status:
  - PING        # 待续跟进
  - TODO        # 待查证
  - 未立案      # 无刑事立案：仅行政/治安处理、不予立案或未见立案信息
  - 罪名未公开  # 已进入刑事程序（立案/刑拘/批捕/公诉）但官方未公布罪名，或程序性质不明

# 罪名（用最高法罪名表的完整罪名；仅在该罪名已被官方指控或判决时使用）
