  - 强奸罪
  - 故意杀人罪
  - 过失致人死亡罪
  - 强制猥亵罪
  - 猥亵儿童罪
  - 非法侵入住宅罪
  - 寻衅滋事罪
  - 侵犯公民个人信息罪
  - 非法利用信息网络罪
  - 传播淫秽物品牟利罪
  - 强迫交易罪
  - 放火罪
  - 无正当理由持有少年性影像罪   # 台湾《儿童及少年性剥削防制条例》罪名

